<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Sound Detector</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f0f8ff; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; margin: 10px; }
        .active { background: #ff4757; color: white; }
        .start { background: #2ed573; color: white; }
        #status { font-weight: bold; margin: 20px 0; color: #555; }
        #result { margin-top: 20px; font-size: 1.2em; }
        .water { color: #1e90ff; font-weight: bold; }
        .details { text-align: left; background: #eee; padding: 10px; border-radius: 5px; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💧 Water Sound Detector</h1>
        <p>Record a sound (running water) to test detection.</p>
        
        <button id="recordBtn" class="start">Start Recording</button>
        <div id="status">Ready...</div>
        
        <div id="result"></div>
        <div id="debugInfo" class="details" style="display:none;"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const debugDiv = document.getElementById('debugInfo');

        let audioContext;
        let mediaStream;
        let scriptProcessor;
        let audioInput;
        let audioBuffer = [];
        let isRecording = false;

        recordBtn.addEventListener('click', async () => {
            console.log("Button clicked!"); // Debug log
            if (isRecording) {
                console.log("Stopping recording...");
                stopRecording();
            } else {
                console.log("Starting recording...");
                startRecording();
            }
        });

        async function startRecording() {
            try {
                // Resume AudioContext if it was suspended (browser policy)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                console.log("Requesting microphone access...");
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Microphone access granted.");
                
                audioInput = audioContext.createMediaStreamSource(mediaStream);
                // Buffer size 4096, 1 input channel, 1 output channel
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                audioInput.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                audioBuffer = []; // Clear buffer

                scriptProcessor.onaudioprocess = (e) => {
                    if (!isRecording) return;
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Cloning the data because valid buffer is reused
                    audioBuffer.push(new Float32Array(inputData));
                };

                isRecording = true;
                recordBtn.textContent = 'Stop Recording';
                recordBtn.classList.remove('start');
                recordBtn.classList.add('active');
                status.textContent = 'Recording (WAV)...';
            } catch (err) {
                console.error(err);
                status.textContent = 'Error accessing microphone: ' + err.message;
            }
        }

        function stopRecording() {
            isRecording = false;
            recordBtn.textContent = 'Start Recording';
            recordBtn.classList.remove('active');
            recordBtn.classList.add('start');
            status.textContent = 'Processing...';

            // Save sampleRate before closing context
            const sampleRate = audioContext.sampleRate;

            // Stop tracks
            mediaStream.getTracks().forEach(track => track.stop());
            scriptProcessor.disconnect();
            audioInput.disconnect();
            audioContext.close();

            exportWAV(audioBuffer, sampleRate);
        }

        function exportWAV(buffers, sampleRate) {
            // Flatten the array of buffers
            let totalLength = 0;
            for (let i = 0; i < buffers.length; i++) {
                totalLength += buffers[i].length;
            }
            
            const result = new Float32Array(totalLength);
            let offset = 0;
            for (let i = 0; i < buffers.length; i++) {
                result.set(buffers[i], offset);
                offset += buffers[i].length;
            }

            // Create WAV file
            const wavBlob = encodeWAV(result, sampleRate);
            sendAudio(wavBlob);
        }

        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            // RIFF chunk descriptor
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');
            
            // fmt sub-chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); // 16-bit

            // data sub-chunk
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);

            // Write PCM samples
            floatTo16BitPCM(view, 44, samples);

            return new Blob([view], { type: 'audio/wav' });
        }

        function floatTo16BitPCM(output, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, input[i]));
                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                output.setInt16(offset, s, true);
            }
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function sendAudio(blob) {
            const formData = new FormData();
            formData.append('audio', blob, 'recording.wav'); // Important: .wav extension

            status.textContent = 'Sending to Python...';
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    status.textContent = 'Error: ' + data.error;
                    return;
                }

                status.textContent = 'Done!';
                resultDiv.innerHTML = data.result;
                if (data.is_water) {
                    resultDiv.className = 'water';
                } else {
                    resultDiv.className = '';
                }

                debugDiv.style.display = 'block';
                debugDiv.innerHTML = `
                    <strong>Confidence:</strong> ${data.confidence}%<br>
                    <strong>Features:</strong><br>
                    ZCR: ${data.features.zcr.toFixed(4)}<br>
                    Centroid: ${data.features.spectral_centroid.toFixed(2)} Hz<br>
                    Rolloff: ${data.features.spectral_rolloff.toFixed(2)} Hz<br>
                    <br><strong>Details:</strong><br>
                    ${data.details.join('<br>')}
                `;

            } catch (err) {
                console.error(err);
                status.textContent = 'Start the python server first!';
            }
        }
    </script>
</body>
</html>
